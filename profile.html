<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — EveryTool.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }
.container { max-width:600px; margin:0 auto; padding:40px 20px; }
h1 { font-size:28px; margin-bottom:24px; }
.card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:24px; margin-bottom:20px; }
.card h2 { font-size:16px; margin-bottom:16px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:#94a3b8; margin-bottom:6px; }
.form-group input { width:100%; padding:10px 14px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:14px; font-family:inherit; }
.form-group input:focus { outline:none; border-color:#3b82f6; }
.form-group input:disabled { opacity:0.5; }
.btn { padding:10px 20px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
.btn:hover { opacity:0.85; }
.btn-primary { background:#3b82f6; color:#fff; }
.btn-danger { background:#ef4444; color:#fff; }
.btn-outline { background:transparent; border:1px solid #334155; color:#e2e8f0; }
.msg { padding:10px; border-radius:8px; font-size:13px; margin-bottom:12px; }
.msg.success { background:#065f46; color:#6ee7b7; }
.msg.error { background:#7f1d1d; color:#fca5a5; }
.back { color:#94a3b8; text-decoration:none; font-size:14px; display:inline-block; margin-bottom:20px; }
.back:hover { color:#e2e8f0; }
.avatar { width:64px; height:64px; border-radius:50%; background:#3b82f6; color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; margin-bottom:16px; }
.stats { display:flex; gap:20px; margin-top:12px; }
.stat { text-align:center; }
.stat-num { font-size:24px; font-weight:700; color:#e2e8f0; }
.stat-label { font-size:12px; color:#94a3b8; }
.danger-zone { border-color:#7f1d1d; }
</style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back">← Back to EveryTool.ai</a>
    <h1>My Profile</h1>
    
    <div id="loading">Loading...</div>
    <div id="profileContent" style="display:none;">
        
        <!-- Profile Info -->
        <div class="card">
            <div class="avatar" id="avatar">H</div>
            <div class="stats">
                <div class="stat"><div class="stat-num" id="likesCount">0</div><div class="stat-label">Likes</div></div>
                <div class="stat"><div class="stat-num" id="favsCount">0</div><div class="stat-label">Favorites</div></div>
                <div class="stat"><div class="stat-num" id="commentsCount">0</div><div class="stat-label">Comments</div></div>
            </div>
        </div>

        <!-- Edit Profile -->
        <div class="card">
            <h2>Edit Profile</h2>
            <div id="profileMsg"></div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="profileEmail" disabled>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>

        <!-- Change Password -->
        <div class="card">
            <h2>Change Password</h2>
            <div id="passMsg"></div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="Confirm new password">
            </div>
            <button class="btn btn-outline" onclick="changePassword()">Update Password</button>
        </div>

        <!-- Danger Zone -->
        <div class="card danger-zone">
            <h2 style="color:#fca5a5;">⚠️ Danger Zone</h2>
            <p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">Permanently delete your account and all associated data. This cannot be undone.</p>
            <button class="btn btn-danger" onclick="deleteAccount()">Delete My Account</button>
        </div>
    </div>

    <div id="notLoggedIn" style="display:none;">
        <div class="card">
            <p>You need to be logged in to view your profile.</p>
            <br>
            <a href="index.html" class="btn btn-primary" style="text-decoration:none;">Go to Homepage</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ecqvyfsxaofboilnlkna.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjcXZ5ZnN4YW9mYm9pbG5sa25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODkxMzIsImV4cCI6MjA4Nzk2NTEzMn0.l0fd6T6z6rfZw_p1H6vsehEDCYCBBFfHCAOLobKJZVE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

async function init() {
    const { data: { user } } = await sb.auth.getUser();
    currentUser = user;
    document.getElementById('loading').style.display = 'none';
    
    if (!currentUser) {
        document.getElementById('notLoggedIn').style.display = 'block';
        return;
    }
    
    document.getElementById('profileContent').style.display = 'block';
    document.getElementById('profileEmail').value = currentUser.email;
    
    // Load profile
    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    if (profile) {
        document.getElementById('displayName').value = profile.display_name || '';
        document.getElementById('avatar').textContent = (profile.display_name || currentUser.email).charAt(0).toUpperCase();
    }
    
    // Load stats
    const { count: likes } = await sb.from('likes').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
    const { count: favs } = await sb.from('favorites').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
    const { count: comments } = await sb.from('comments').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
    document.getElementById('likesCount').textContent = likes || 0;
    document.getElementById('favsCount').textContent = favs || 0;
    document.getElementById('commentsCount').textContent = comments || 0;
}

async function saveProfile() {
    const name = document.getElementById('displayName').value.trim();
    if (!name) { showMsg('profileMsg', 'Please enter a name', 'error'); return; }
    const { error } = await sb.from('profiles').upsert({ id: currentUser.id, display_name: name });
    if (error) { showMsg('profileMsg', error.message, 'error'); return; }
    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
    showMsg('profileMsg', 'Profile updated!', 'success');
}

async function changePassword() {
    const newPass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    if (!newPass || newPass.length < 6) { showMsg('passMsg', 'Password must be at least 6 characters', 'error'); return; }
    if (newPass !== confirm) { showMsg('passMsg', 'Passwords do not match', 'error'); return; }
    const { error } = await sb.auth.updateUser({ password: newPass });
    if (error) { showMsg('passMsg', error.message, 'error'); return; }
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
    showMsg('passMsg', 'Password updated!', 'success');
}

async function deleteAccount() {
    if (!confirm('Are you sure you want to delete your account? This cannot be undone.')) return;
    if (!confirm('FINAL WARNING: All your data (likes, favorites, comments) will be permanently deleted. Continue?')) return;
    
    // Delete user data
    await sb.from('likes').delete().eq('user_id', currentUser.id);
    await sb.from('favorites').delete().eq('user_id', currentUser.id);
    await sb.from('comments').delete().eq('user_id', currentUser.id);
    await sb.from('profiles').delete().eq('id', currentUser.id);
    
    // Sign out
    await sb.auth.signOut();
    window.location.href = 'index.html';
}

function showMsg(id, text, type) {
    document.getElementById(id).innerHTML = `<div class="msg ${type}">${text}</div>`;
    setTimeout(() => { document.getElementById(id).innerHTML = ''; }, 3000);
}

init();
</script>
</body>
</html>
